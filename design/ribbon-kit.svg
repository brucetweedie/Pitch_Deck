<svg xmlns="http://www.w3.org/2000/svg" width="900" height="170" viewBox="0 0 900 170">
<defs>
  <style>@font-face{font-family:'Inter';font-weight:600;font-style:normal;src:url(data:font/woff2;base64,) format('woff2');}
    text{font-family:'Inter',sans-serif;font-weight:600;}</style>
  <linearGradient id="rollg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0"   stop-color="#9a6206"/>
    <stop offset="0.30" stop-color="#f0ad2c"/>
    <stop offset="0.52" stop-color="#ffc24a"/>
    <stop offset="0.74" stop-color="#e09a18"/>
    <stop offset="1"   stop-color="#7e4f03"/>
  </linearGradient>
  <filter id="sh" x="-20%" y="-20%" width="140%" height="160%">
    <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#000000" flood-opacity="0.55"/>
  </filter>
</defs>
<!-- Reusable ribbon. Parts: #shadow #carpet #curl #text #roll, grouped #ribbon. Origin left edge.
     Animate: clip-reveal #carpet+#text L->R; translate #roll+#curl along leading edge. -->
<g id="ribbon" data-w="758">
  <rect id="shadow" x="60" y="40" width="758.0" height="88" rx="8" fill="#FDB525" filter="url(#sh)"/>
  <rect id="carpet" x="60" y="40" width="758.0" height="88" rx="8" fill="#FDB525"/>
  <rect id="curl" x="762.0" y="40" width="14" height="88" fill="#d98e15"/>
  <text id="text" x="104" y="84.0" font-size="46" fill="#000000" dominant-baseline="central">Question text goes here</text>
  <g id="roll">
    <rect x="772.0" y="33" width="46" height="102" rx="23" fill="url(#rollg)" stroke="#6e4502" stroke-width="1"/>
    <ellipse cx="795.0" cy="39" rx="20" ry="5" fill="#caa23a" opacity="0.7"/>
  </g>
</g>
</svg>